name: Controller integrity

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify controller boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Reject source, build output, and credential-shaped files
        shell: bash
        run: |
          set -euo pipefail

          forbidden_paths='^(src|public|dist|node_modules)/|(^|/)(\.env($|\.)|[^/]*\.(pem|key|token|log)$)'
          tracked_files="$(git ls-files)"

          if grep -E "$forbidden_paths" <<<"$tracked_files"; then
            echo 'Application source, build output, or credential-shaped files are forbidden.' >&2
            exit 1
          fi

          test -f README.md
          test -f SECURITY.md
          test -f .github/CODEOWNERS
          test -f .github/workflows/controller-integrity.yml
          test -f .github/workflows/phase-0-preview.yml

          expected_workflows="$(
            printf '%s\n' \
              '.github/workflows/controller-integrity.yml' \
              '.github/workflows/phase-0-preview.yml'
          )"
          actual_workflows="$(git ls-files .github/workflows | sort)"
          [[ "$actual_workflows" == "$expected_workflows" ]]

      - name: Reject committed token and private-key material
        shell: bash
        run: |
          set -euo pipefail

          if git grep -nE \
            'gh[pousr]_[A-Za-z0-9_]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----'; then
            echo 'Possible credential material detected.' >&2
            exit 1
          fi
      - name: Enforce immutable actions and the deployment secret boundary
        shell: bash
        run: |
          set -euo pipefail

          expected_actions="$(
            printf '%s\n' \
              'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' \
              'actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c' \
              'actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38' \
              'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' \
              'cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0' |
              sort
          )"
          actual_actions="$(
            sed -nE \
              's/^[[:space:]]*uses:[[:space:]]*([^[:space:]]+).*/\1/p' \
              .github/workflows/*.yml |
              sort -u
          )"
          [[ "$actual_actions" == "$expected_actions" ]]

          while IFS= read -r action; do
            [[ "$action" =~ ^[^@]+@[0-9a-f]{40}$ ]]
          done <<<"$actual_actions"

          workflow='.github/workflows/phase-0-preview.yml'
          build_section="$(sed -n '/^  build:/,/^  deploy:/p' "$workflow")"
          deploy_section="$(sed -n '/^  deploy:/,$p' "$workflow")"

          if grep -q 'CLOUDFLARE_' <<<"$build_section"; then
            echo 'Cloudflare secrets must never enter the source build job.' >&2
            exit 1
          fi

          if grep -Eq \
            'actions/(checkout|setup-node)|node_modules|(^|[[:space:]])(npm|npx)[[:space:]]' \
            <<<"$deploy_section"; then
            echo 'The protected deploy job must not execute private-source tooling.' >&2
            exit 1
          fi

          grep -q 'actions/download-artifact@' <<<"$deploy_section"
          grep -q 'cloudflare/wrangler-action@' <<<"$deploy_section"
